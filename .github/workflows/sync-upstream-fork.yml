name: Sync Fork From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO != '' && vars.UPSTREAM_REPO || 'Smart-White-Board/LED-Board' }}
      FORK_TOKEN: ${{ github.token }}
      AUTH_TOKEN: ${{ secrets.SYNC_TOKEN }}
    steps:
      - name: Validate configuration
        run: |
          if [[ -z "${UPSTREAM_REPO}" ]]; then
            echo "Missing repository variable UPSTREAM_REPO (format: owner/repo)."
            exit 1
          fi
          if [[ -z "${AUTH_TOKEN}" ]]; then
            echo "Missing secret SYNC_TOKEN."
            echo "Create it in: Settings > Secrets and variables > Actions > Secrets"
            echo "Required scope: read access to ${UPSTREAM_REPO}."
            exit 1
          fi

      - name: Validate upstream token access
        run: |
          set -e
          API_URL="https://api.github.com/repos/${UPSTREAM_REPO}"
          HTTP_CODE=$(curl -sS -o /tmp/upstream_repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}")

          if [[ "${HTTP_CODE}" != "200" ]]; then
            echo "SYNC_TOKEN cannot access upstream repo ${UPSTREAM_REPO} (HTTP ${HTTP_CODE})."
            echo "For fine-grained PAT:"
            echo "- Resource owner should be Smart-White-Board (or a principal with access to that org repo)."
            echo "- Repository access must include LED-Board."
            echo "- Repository permission Contents must include Read."
            echo "If your org enforces SSO, authorize the token for Smart-White-Board."
            exit 1
          fi

      - name: Initialize local git repository
        run: |
          git init .
          git config user.name "fork-sync-bot"
          git config user.email "fork-sync-bot@users.noreply.github.com"

      - name: Configure remotes and checkout fork branch
        run: |
          git remote add origin "https://x-access-token:${FORK_TOKEN}@github.com/${{ github.repository }}.git"
          git remote add upstream "https://x-access-token:${AUTH_TOKEN}@github.com/${UPSTREAM_REPO}.git"

          git fetch origin "${DEFAULT_BRANCH}" --tags
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Fetch upstream branches and tags
        run: |
          git fetch upstream --prune --tags

      - name: Fast-forward default branch
        run: |
          git checkout "${DEFAULT_BRANCH}"
          git merge --ff-only "upstream/${DEFAULT_BRANCH}"

      - name: Push branch and tags to fork
        run: |
          git push origin "${DEFAULT_BRANCH}"
          git push origin --tags
