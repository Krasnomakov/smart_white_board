name: Sync Fork From Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO != '' && vars.UPSTREAM_REPO || 'Smart-White-Board/LED-Board' }}
      AUTH_TOKEN: ${{ secrets.SYNC_TOKEN }}
    steps:
      - name: Validate configuration
        run: |
          if [[ -z "${UPSTREAM_REPO}" ]]; then
            echo "Missing repository variable UPSTREAM_REPO (format: owner/repo)."
            exit 1
          fi
          if [[ -z "${AUTH_TOKEN}" ]]; then
            echo "Missing secret SYNC_TOKEN."
            echo "Create it in: Settings > Secrets and variables > Actions > Secrets"
            echo "Required scope: read access to ${UPSTREAM_REPO} and write access to this fork."
            exit 1
          fi

      - name: Initialize local git repository
        run: |
          git init .
          git config user.name "fork-sync-bot"
          git config user.email "fork-sync-bot@users.noreply.github.com"

      - name: Configure remotes and checkout fork branch
        run: |
          git remote add origin "https://x-access-token:${AUTH_TOKEN}@github.com/${{ github.repository }}.git"
          git remote add upstream "https://x-access-token:${AUTH_TOKEN}@github.com/${UPSTREAM_REPO}.git"

          git fetch origin "${DEFAULT_BRANCH}" --tags
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Fetch upstream branches and tags
        run: |
          git fetch upstream --prune --tags

      - name: Fast-forward default branch
        run: |
          git checkout "${DEFAULT_BRANCH}"
          git merge --ff-only "upstream/${DEFAULT_BRANCH}"

      - name: Push branch and tags to fork
        run: |
          git push origin "${DEFAULT_BRANCH}"
          git push origin --tags
